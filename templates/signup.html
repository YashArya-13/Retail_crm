{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="card shadow-sm border-0 card-shadow">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <span class="badge bg-primary rounded-pill px-4 py-2">Signup</span>
                    <h3 class="mt-3">Create your account</h3>
                    <p class="text-muted">Join Retail CRM to manage your profile and dashboard.</p>
                </div>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input class="form-control form-control-lg" name="username" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control form-control-lg" type="email" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input class="form-control form-control-lg" type="password" name="password" required>
                    </div>

                    <button class="btn btn-primary w-100 rounded-pill mb-3">
                        <i class="bi bi-person-plus me-2"></i>Signup
                    </button>

                    <a href="{{ url_for('google_login') }}"
                       class="btn btn-danger w-100 rounded-pill">
                        <i class="bi bi-google me-2"></i>Continue with Google
                    </a>

                </form>

                <div class="text-center mt-4 text-muted">
                    Already have an account?
                    <a href="{{ url_for('login') }}">Login</a>
                </div>

            </div>
        </div>
    </div>
</div>

{% endblock %}
